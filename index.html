    // --- Execution Logic (Topological Sort & Autonomous Loops) ---
    
    runButton.addEventListener('click', startExecution);

    // FIX: Modified Topological Sort to handle stateful nodes (History Manager) AND cycle breakers (Chat Terminal/Interface)
    function getExecutionOrder() {
        const order = [], visited = new Set(), visiting = new Set();
        
        function visit(nodeId) {
            if (visited.has(nodeId)) return;

            // Find the node object
            const currentNode = nodes.find(n => n.id === nodeId);
             if (!currentNode) return;

            if (visiting.has(nodeId)) {
                throw new Error("Cycle detected in the flow (non-stateful loop). Execution aborted.");
            }
            
            visiting.add(nodeId);
            
            // Iterate over incoming connections (dependencies)
            connections.filter(c => c.toNode === nodeId).forEach(conn => {
                
                // FIX PART 1: Skip dependencies for inputs to stateful nodes (History Manager)
                if (STATEFUL_NODE_TYPES.includes(currentNode.type)) {
                    return; 
                }

                // FIX PART 2: Check the source of the connection (the ancestor/dependency)
                const sourceNode = nodes.find(n => n.id === conn.fromNode);

                // If the dependency is a CYCLE_BREAKER (like Chat Terminal/Interface)
                if (sourceNode && CYCLE_BREAKER_TYPES.includes(sourceNode.type)) {
                    return;
                }

                visit(conn.fromNode);
            });
            
            visiting.delete(nodeId); 
            visited.add(nodeId); 
            order.push(nodeId);
        }
        
        try { 
            nodes.forEach(node => visit(node.id)); 
        } 
        catch (error) { 
            setStatus('error', "Cycle Detected"); 
            showToast(error.message, 'error'); 
            return null; 
        }
        return order;
    }

    // --- UPDATE: Helper to determine API Key and Model URL ---
    function getLLMConfig(nodeSpecificModel = null) {
        let modelId = nodeSpecificModel || globalDefaultModel;
        let apiKey = userGeminiApiKey; 

        // If the user hasn't provided a key, they must use the default environment model.
        if (!apiKey) {
            // If they tried to select a non-default model without a key, reset to default.
            if (modelId !== DEFAULT_ENV_MODEL) {
                console.warn(`Model override to '${modelId}' ignored because no API key is provided. Using environment default.`);
                modelId = DEFAULT_ENV_MODEL;
            }
            // apiKey remains empty string, allowing environment fallback
        }

        const baseUrl = 'https://generativelanguage.googleapis.com/v1beta/models/';

        return {
            apiKey: apiKey,
            modelId: modelId,
            // Construct URL for generateContent endpoint
            url: `${baseUrl}${modelId}:generateContent?key=${apiKey}`
        };
    }


    // --- Helper function for standard Gemini API calls (Text and Structured) ---
    /**
     * Helper function to call the Gemini API for specialized nodes (Summarization, Sentiment, Evaluator etc.).
     * @param {string} prompt The text prompt.
     * @param {object|null} jsonSchema Optional JSON schema for structured output.
     * @param {string|null} modelOverride Optional model ID to override the global default.
     * @returns {Promise<string|object>} The response text or parsed JSON object.
     */
    async function callGeminiAPI(prompt, jsonSchema = null, modelOverride = null) {
        const payload = {
            contents: [{ role: "user", parts: [{ text: prompt }] }]
        };

        // If a JSON schema is provided, configure for structured JSON output using generationConfig
        if (jsonSchema) {
            payload.generationConfig = {
                responseMimeType: "application/json",
                responseSchema: jsonSchema
            };
        }

        // UPDATE: Get API configuration based on settings/overrides
        const config = getLLMConfig(modelOverride);
        const apiUrl = config.url;

        const response = await fetch(apiUrl, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        if (!response.ok) {
            throw new Error(`Gemini API Error (${config.modelId}): ${response.statusText}`);
        }

        const result = await response.json();

        if (result.candidates?.[0]?.content?.parts?.[0]?.text) {
            const textOutput = result.candidates[0].content.parts[0].text;
            if (jsonSchema) {
                try {
                    // The API returns the JSON as a string within the text part when using responseMimeType
                    return JSON.parse(textOutput);
                } catch (e) {
                    console.error("Raw API output:", textOutput);
                    throw new Error("Failed to parse structured JSON response from API.");
                }
            }
            return textOutput.trim(); // Return trimmed text for non-JSON responses
        } else {
            console.error("API Response Structure:", result);
            throw new Error('No content returned from LLM.');
        }
    }

    // UPDATE: New function to manage starting/stopping execution (single or autonomous)
    // Handles the Run/Stop button logic.
    async function startExecution() {
        if (isExecuting) {
            // If currently executing, treat as a STOP button
            if (isAutonomousMode) {
                stopAutonomousExecution = true;
                setStatus('running', 'Stopping autonomous run...');
                // The runAutonomousLoop will check this flag and stop after the current cycle finishes.
                // We disable the button briefly until the loop confirms stop.
                runButton.disabled = true; 
            }
            return;
        }

        // Start Execution
        isExecuting = true;
        stopAutonomousExecution = false;
        currentCycleCount = 0;
        
        // Update UI based on mode
        if (isAutonomousMode) {
            // Change Run button to Stop button
            runButton.innerHTML = '<span class="material-symbols-outlined">stop</span>Stop Flow';
            // Use CSS variable for danger color
            runButton.style.backgroundColor = 'var(--danger-color)'; 

            // Disable autonomous controls during run
            autonomousToggle.disabled = true;
            maxCyclesInput.disabled = true;

            await runAutonomousLoop();
        } else {
            runButton.disabled = true; // Disable during single run
            await executeFlowCycle();
        }

        // Reset state after execution finishes (single or autonomous)
        // Only reset if we are not paused (e.g. waiting for chat-terminal input in single run mode)
        if (statusText.textContent.includes('Awaiting')) {
            // If paused, keep isExecuting true so the Stop button logic works if needed (though less critical for single runs)
        } else {
            isExecuting = false;
            runButton.disabled = false;
            autonomousToggle.disabled = false;
            maxCyclesInput.disabled = false;
            
            // Reset Run button appearance
            runButton.innerHTML = '<span class="material-symbols-outlined">play_arrow</span>Run Flow';
            // Use CSS variable for primary button color
            runButton.style.backgroundColor = 'var(--button-primary-bg)'; 
        }
    }

    // UPDATE: New function to manage continuous autonomous execution
    async function runAutonomousLoop() {
        while (currentCycleCount < maxAutonomousCycles && !stopAutonomousExecution) {
            currentCycleCount++;
            setStatus('running', `Autonomous Cycle ${currentCycleCount}/${maxAutonomousCycles}`);
            
            const result = await executeFlowCycle();
            
            // UPDATE: Check stopAutonomousExecution again immediately after cycle (e.g., if Stop Signal node was hit)
            if (stopAutonomousExecution) {
                break;
            }

            if (result === CYCLE_RESULT.ERROR) {
                // Error status/toast is usually handled within executeFlowCycle/executeNode, but we ensure the loop stops.
                console.log(`Autonomous run stopped due to error on cycle ${currentCycleCount}.`);
                break;
            }
            
            if (result === CYCLE_RESULT.PAUSED_FOR_INPUT) {
                // Status is set by executeNode (e.g., "Awaiting User Input...")
                // The loop stops here. If the user provides input (e.g., via Chat Interface), startExecution will be called again.
                console.log(`Autonomous run paused for user input (Cycle ${currentCycleCount}).`);
                break;
            }

            // Add a small delay between cycles for visualization and responsiveness
            if (currentCycleCount < maxAutonomousCycles && !stopAutonomousExecution) {
                // Allow UI to update and check for stop signal
                await new Promise(resolve => setTimeout(resolve, 500)); 
            }
        }

        // Final status update after loop finishes
        // If stopped by Stop Signal node, status is already set to 'success' (Goal Reached)
        if (stopAutonomousExecution && !statusText.textContent.includes('Goal Reached')) {
            setStatus('ready', 'Run stopped by user.');
        } else if (currentCycleCount >= maxAutonomousCycles) {
            setStatus('success', `Autonomous run completed (${maxAutonomousCycles} cycles).`);
        }
        // If paused, the status remains "Awaiting Input..." set by the node.
    }


    // UPDATE: Renamed from executeFlow to executeFlowCycle
    // Main function to run a SINGLE cycle of the flow in the calculated order.
    // Returns the result of the cycle (SUCCESS, ERROR, PAUSED_FOR_INPUT).
    async function executeFlowCycle() {
        // Reset all node states before execution
        nodes.forEach(n => { 
            if (!STATEFUL_NODE_TYPES.includes(n.type) && 
                !CYCLE_BREAKER_TYPES.includes(n.type) && 
                n.type !== 'conditional-logic' && 
                n.type !== 'ai-evaluator') 
            {
                 n.outputBuffer = null; 
            }
            n.el.classList.remove('error', 'success', 'active', 'paused'); // Added 'paused' reset
        });
        document.querySelectorAll('.connection-path').forEach(path => path.classList.remove('active'));
        
        // Only show "Analyzing flow..." if it's the first cycle or a single run
        if (!isAutonomousMode || currentCycleCount <= 1) {
            setStatus('running', 'Analyzing flow...');
        }
        
        const executionOrder = getExecutionOrder();
        if (!executionOrder) { 
            // Error already handled in getExecutionOrder (toast/status)
            return CYCLE_RESULT.ERROR; 
        }

        let cycleStatus = CYCLE_RESULT.SUCCESS;

        try {
            for (const nodeId of executionOrder) {
                // UPDATE: Check stop flag during autonomous execution within the cycle loop
                if (isAutonomousMode && stopAutonomousExecution) {
                    // Stop signal might come from user click OR Stop Signal node
                    if (!statusText.textContent.includes('Goal Reached')) {
                        throw new Error("Autonomous execution stopped by user during cycle.");
                    }
                    break; // Stop cycle if Goal Reached (Stop Signal)
                }

                const node = nodes.find(n => n.id === nodeId);
                const inputs = new Array(node.inputs.length).fill(undefined);
                const incomingConnections = connections.filter(c => c.toNode === nodeId);
                
                // Collect inputs from preceding nodes' output buffers
                incomingConnections.forEach(conn => {
                    const fromNode = nodes.find(n => n.id === conn.fromNode);

                    // UPDATE: Handle Multi-Output Nodes (Conditional, Evaluator)
                    if (fromNode.type === 'conditional-logic' || fromNode.type === 'ai-evaluator') {
                        // Check if the output buffer exists and is structured
                        if (fromNode.outputBuffer && typeof fromNode.outputBuffer === 'object' && fromNode.outputBuffer.hasOwnProperty('index')) {
                            // Only pass data if the connection's 'fromPortIndex' matches the active output 'index'
                            if (conn.fromPortIndex === fromNode.outputBuffer.index) {
                                inputs[conn.toPortIndex] = fromNode.outputBuffer.data;
                                document.getElementById(conn.id)?.classList.add('active');
                            }
                            // If the index doesn't match, the connection is inactive for this cycle (input remains undefined).
                        }
                    } 
                    // Handle standard single-output nodes
                    // This correctly uses the persistent outputBuffer from Cycle Breakers/Stateful nodes if available.
                    else if (fromNode.outputBuffer !== null && fromNode.outputBuffer !== undefined) {
                        inputs[conn.toPortIndex] = fromNode.outputBuffer; 
                        document.getElementById(conn.id)?.classList.add('active');
                    }
                });
                
                // Execute the node
                // UPDATE: Check if executeNode paused the flow
                const nodeResult = await executeNode(nodeId, inputs);
                
                // Deactivate connections after node execution completes (or fails)
                // UPDATE: Only deactivate connections that were active (important for multi-output nodes)
                incomingConnections.forEach(conn => {
                    const path = document.getElementById(conn.id);
                    if (path && path.classList.contains('active')) {
                        path.classList.remove('active');
                    }
                });

                // UPDATE: Handle pause result
                if (nodeResult === CYCLE_RESULT.PAUSED_FOR_INPUT) {
                    cycleStatus = CYCLE_RESULT.PAUSED_FOR_INPUT;
                    // If a node pauses, the cycle stops here.
                    break; 
                }
            }
            
            // Update status if the cycle completed successfully (and wasn't stopped by Stop Signal)
            if (cycleStatus === CYCLE_RESULT.SUCCESS && !stopAutonomousExecution) {
                if (isAutonomousMode) {
                    // Status for autonomous mode is handled primarily by runAutonomousLoop
                } else {
                    setStatus('success', 'Flow completed!');
                }
            }
        } catch (e) { 
            cycleStatus = CYCLE_RESULT.ERROR;

            // Handle errors including intentional pauses cancellation (from chat-terminal)
            if (e.message === 'Dialog cancelled by user.') {
                setStatus('error', 'Flow Cancelled');
                showToast('Flow execution cancelled by user.', 'error');
            } else if (e.message === 'Autonomous execution stopped by user during cycle.') {
                // Status handled by runAutonomousLoop
            } else {
                console.error("Flow execution halted.", e); 
                // Status might already be set by executeNode, but ensure error state if not.
                if (!statusDot.classList.contains('error')) {
                    setStatus('error', 'Execution Error');
                }
            }
        }
        finally { 
            // Ensure 'paused' state is removed from all nodes after flow completion/error (unless actually paused for input)
            if (cycleStatus !== CYCLE_RESULT.PAUSED_FOR_INPUT) {
                nodes.forEach(n => {
                    n.el.classList.remove('paused');
                });
            }

            // UPDATE: Consume input from cycle breakers (like chat-interface) after the cycle is complete and successful
            // This ensures the next cycle doesn't re-process the same input.
            if (cycleStatus === CYCLE_RESULT.SUCCESS) {
                 nodes.forEach(n => {
                    // Only clear cycle breakers that aren't modal-based (chat-terminal handles its buffer during modal interaction)
                    if (CYCLE_BREAKER_TYPES.includes(n.type) && n.type !== 'chat-terminal') {
                        n.outputBuffer = null; 
                    }
                    // UPDATE: Clear buffer for multi-output nodes so they re-evaluate next cycle
                    if (n.type === 'conditional-logic' || n.type === 'ai-evaluator') {
                        n.outputBuffer = null;
                    }
                });
            }
        }
        return cycleStatus;
    }
    
    // Helper function for JSON parsing: Safely access nested properties
    const getDeep = (obj, path) => {
        const keys = path.replace(/\[(\w+)\]/g, '.$1').split('.');
        let result = obj;
        for (const key of keys) {
            result = result ? result[key] : undefined;
            if (result === undefined) return undefined;
        }
        return result;
    };

    // Executes the logic for a single node based on its type and inputs.
    async function executeNode(nodeId, inputData) {
        const node = nodes.find(n => n.id === nodeId); 
        if (!node) return CYCLE_RESULT.SUCCESS; // Should not happen

        // Initialize node state for execution
        node.el.classList.remove('error', 'success', 'paused'); // Added 'paused' removal here too
        node.el.classList.add('active');

        // Update status only if not in autonomous mode (to avoid flickering status text, handled by runAutonomousLoop)
        if (!isAutonomousMode) {
             setStatus('running', `Running: ${NODE_DEFINITIONS[node.type].title}`);
        }

        node.inputBuffer = inputData; 

        try {
            let output = null;
            switch(node.type) {
                
                 // --- Inputs/Media ---
                case 'text-input': case 'system-prompt': 
                    output = node.el.querySelector('.node-value').value; break;
                case 'file-upload': 
                    if (node.internalState.fileData) {
                        if (node.internalState.fileData.mimeType === 'application/pdf') {
                            // Extract text from PDF if it's a PDF file
                            output = await extractTextFromPDF(node.internalState.fileData.data);
                        } else { output = node.internalState.fileData; }
                    }
                    break;
                case 'webcam-capture': 
                    output = node.internalState.imageData; 
                    if (!output && inputData.length === 0) showToast("Webcam Capture node has no captured image.", "error"); 
                    break;
                case 'audio-recorder': output = node.internalState.audioData; if (!output && inputData.length === 0) showToast("Audio Recorder node has no recording.", "error"); break;
                case 'drawing-canvas':
                    output = node.el.querySelector('.node-drawing-canvas').toDataURL('image/png');
                    break;

                // --- User Interaction ---
                
                 // NEW: Chat Interface (Auto-Run UI)
                case 'chat-interface':
                    // Input 0: Agent Message (Input from LLM)
                    const agentResponse = inputData[0];
                    // Only update UI if the agent provided a response (avoids adding empty bubbles)
                    if (agentResponse !== undefined && agentResponse !== null && agentResponse !== "") {
                        addMessageToChatUI(node, String(agentResponse), 'agent');
                    }
                    
                    // UPDATE: Handle pausing in autonomous mode if user input is required but not provided yet.
                    if (isAutonomousMode && node.outputBuffer === null) {
                        // If we are running autonomously, and the user hasn't provided input since the last cycle, we must pause.
                        node.el.classList.remove('active');
                        node.el.classList.add('paused');
                        setStatus('running', 'Paused: Awaiting User Input (Chat Interface)...');
                        // The autonomous loop will stop (break). The user must type and send, which triggers startExecution again.
                        return CYCLE_RESULT.PAUSED_FOR_INPUT; 
                    }

                    // The output (user response) is stored in outputBuffer (set by user interaction or persisted from previous cycle).
                    output = node.outputBuffer; 
                    // Buffer will be cleared at the end of the cycle (in executeFlowCycle finally).
                    break;

                // Chat Terminal (Modal Pause)
                case 'chat-terminal':
                    const agentMessage = inputData[0] !== undefined && inputData[0] !== null ? inputData[0] : "(Agent did not respond)";
                    // History (Input 1) is expected to be an array if provided by History Manager, or a string
                    let history = "";
                    if (Array.isArray(inputData[1])) {
                        // Format array history for display (simple join for now)
                        history = inputData[1].join('\n'); 
                    } else if (inputData[1]) {
                        history = String(inputData[1]);
                    }
                    
                    node.el.querySelector('.node-output-preview').textContent = agentMessage;
                    
                    // Format the prompt for the modal dialog
                    let promptMessage = "";
                    if (history) {
                        promptMessage += "--- CHAT HISTORY ---\n" + history + "\n----------------------\n\n";
                    }
                    promptMessage += "Agent: " + agentMessage + "\n\n(Enter your response below)";

                    // Pause execution and wait for user input
                    node.el.classList.remove('active');
                    node.el.classList.add('paused');
                    setStatus('running', 'Awaiting Chat Input (Modal)...');

                    // UPDATE: If in autonomous mode, we cannot show a modal dialog as it blocks the loop.
                    // Instead, we just pause the autonomous run.
                    if (isAutonomousMode) {
                        // We cannot proceed autonomously if modal input is required.
                        return CYCLE_RESULT.PAUSED_FOR_INPUT;
                    }
                    
                    // showModalDialog will throw an error if cancelled, which halts the flow (caught below)
                    output = await showModalDialog("Chat Terminal Interaction", promptMessage, true);
                    
                    // Resume execution after user input (only relevant for single run mode)
                    node.el.classList.remove('paused');
                    node.el.classList.add('active');
                    // Reset status after input received, allowing the flow to continue visually
                    isExecuting = true; 
                    setStatus('running', `Running: ${NODE_DEFINITIONS[node.type].title}`);
                    break;
                
                // --- NEW: Text Processing & Structured Data ---

                case 'summarization':
                    if (!inputData[0]) throw new Error("Summarization requires input text.");
                    const summaryPrompt = `Please provide a concise summary of the following text:\n\n---\n${inputData[0]}\n---\n\nSUMMARY:`;
                    // UPDATE: Use the helper function with potential model override
                    output = await callGeminiAPI(summaryPrompt, null, node.data.model);
                    node.el.querySelector('.node-output-preview').textContent = output.substring(0, 200) + (output.length > 200 ? '...' : '');
                    break;

                case 'sentiment-analysis':
                    if (!inputData[0]) throw new Error("Sentiment Analysis requires input text.");
                    const sentimentPrompt = `Analyze the sentiment of the following text. Respond strictly according to the required JSON schema.\n\nTEXT:\n${inputData[0]}`;
                    const sentimentSchema = {
                        type: "OBJECT",
                        properties: {
                            sentiment: { type: "STRING", description: "Overall sentiment (e.g., Positive, Negative, Neutral)" },
                            score: { type: "NUMBER", description: "Confidence score from 0.0 to 1.0" }
                        },
                        required: ["sentiment", "score"]
                    };
                    // UPDATE: Use the helper function with potential model override
                    output = await callGeminiAPI(sentimentPrompt, sentimentSchema, node.data.model);
                    node.el.querySelector('.node-output-preview').textContent = JSON.stringify(output, null, 2);
                    break;
                
                case 'text-classification':
                    if (!inputData[0]) throw new Error("Text Classification requires input text.");
                    if (!node.data.categories) throw new Error("Text Classification requires categories to be defined.");
                    
                    const categories = node.data.categories.split('\n').map(c => c.trim()).filter(c => c.length > 0);
                    if (categories.length === 0) throw new Error("No valid categories defined for classification.");

                    const classificationPrompt = `Classify the following text into exactly one of the categories listed below. Respond ONLY with the name of the category.\n\nCATEGORIES:\n${categories.join('\n')}\n\nTEXT:\n${inputData[0]}\n\nCATEGORY:`;
                    // UPDATE: Use the helper function with potential model override
                    output = await callGeminiAPI(classificationPrompt, null, node.data.model);
                    
                    // Optional: Validate if the output matches one of the categories
                    if (!categories.map(c => c.toLowerCase()).includes(output.toLowerCase())) {
                         console.warn("LLM returned a classification not strictly in the list:", output);
                    }
                    break;

                case 'json-extractor':
                    if (!inputData[0]) throw new Error("JSON Extractor requires input text.");
                    if (!node.data.schema) throw new Error("JSON Extractor requires a JSON schema.");

                    let userSchema;
                    try {
                        const schemaDef = JSON.parse(node.data.schema);
                        userSchema = {
                            type: "OBJECT",
                            properties: Object.fromEntries(Object.entries(schemaDef).map(([key, type]) => [key, { type: String(type).toUpperCase() }])),
                            required: Object.keys(schemaDef)
                        };
                    } catch (e) {
                        throw new Error("Invalid JSON Schema format provided in node configuration.");
                    }
                    
                    const extractionPrompt = `Extract structured data from the following text according to the provided JSON schema. Ensure the output strictly adheres to the schema.\n\nTEXT:\n${inputData[0]}`;
                    // UPDATE: Use the helper function with potential model override
                    output = await callGeminiAPI(extractionPrompt, userSchema, node.data.model);
                    break;

                // --- Utilities & Data Processing ---
                case 'string-formatter': output = runStringFormatter(node, inputData); break;
                
                // UPDATE/FIX: History Manager Execution Logic
                case 'history-manager':
                    // Ensure buffer exists (it should due to init, but safety first)
                    if (!node.internalState.buffer) node.internalState.buffer = [];
                    
                    // 1. Output the *current* state (READ)
                    output = [...node.internalState.buffer]; 

                    // 2. Append input if provided (WRITE)
                    if (inputData[0] !== undefined && inputData[0] !== null) {
                        let historyEntry = inputData[0];
                        if (typeof inputData[0] === 'object' && inputData[0].text) {
                             historyEntry = inputData[0].text;
                        }
                        
                        if (historyEntry !== "") {
                             node.internalState.buffer.push(historyEntry);
                        }
                    }
                    
                    // 3. Update the UI count
                    const countPre = node.el.querySelector('.history-count');
                    if (countPre) countPre.textContent = node.internalState.buffer.length;
                    break;

                
                case 'math-operation':
                    const valA_input = node.el.querySelector('.math-value-a'), valB_input = node.el.querySelector('.math-value-b');
                    const valA = inputData[0] !== undefined ? parseFloat(inputData[0]) : parseFloat(valA_input.value);
                    const valB = inputData[1] !== undefined ? parseFloat(inputData[1]) : parseFloat(valB_input.value);
                    valA_input.value = valA; valB_input.value = valB;
                    output = calculateMath(valA, valB, node.el.querySelector('.math-op-select').value);
                    node.el.querySelector('.node-output-preview').textContent = output; break;

                case 'json-parser':
                    if (!inputData[0]) throw new Error("JSON Parser requires input.");
                    const path = node.data.path;
                    if (!path) throw new Error("JSON Parser requires a path.");
                    
                    let jsonObject;
                    try {
                        // Input might already be an object if coming from Web Request node or JSON Extractor
                        jsonObject = typeof inputData[0] === 'string' ? JSON.parse(inputData[0]) : inputData[0];
                    } catch (e) {
                        throw new Error("Invalid JSON input format.");
                    }
                    
                    output = getDeep(jsonObject, path);
                    
                    const preview = node.el.querySelector('.node-output-preview');
                    preview.textContent = typeof output === 'object' ? JSON.stringify(output, null, 2) : String(output);
                    break;
                
                // UPDATED: Code Runner execution logic
                case 'code-runner':
                    const code = node.data.code;
                    if (!code) throw new Error("Code Runner has no script.");
                    
                    const inputA = inputData[0];
                    const inputB = inputData[1];

                    try {
                        // Create a function that accepts inputA and inputB
                        const userFunc = new Function('inputA', 'inputB', code);
                        output = userFunc(inputA, inputB);
                    } catch (e) {
                        throw new Error(`JavaScript execution error: ${e.message}`);
                    }
                    break;

                // --- AI/Logic (Generic LLM Call) ---
                
                // --- UPDATE: AI Evaluator (Pass/Fail Logic) ---
                case 'ai-evaluator':
                    const inputToEvaluate = inputData[0];
                    if (inputToEvaluate === undefined || inputToEvaluate === null) throw new Error("AI Evaluator requires 'Input to Evaluate'.");

                    // Determine criteria: Use Input 1 if connected, otherwise use internal configuration
                    let criteria = inputData[1];
                    if (criteria === undefined || criteria === null || criteria === "") {
                        criteria = node.data.criteria;
                    }
                    if (!criteria) throw new Error("AI Evaluator requires criteria (either via Input 1 or configuration).");

                    const evaluationPrompt = `Evaluate the INPUT based on the CRITERIA. Respond strictly according to the JSON schema: {verdict: 'PASS'|'FAIL', feedback: 'string'}. If the verdict is 'FAIL', provide constructive feedback on how the input failed the criteria.

CRITERIA:
${criteria}

INPUT:
${typeof inputToEvaluate === 'object' ? JSON.stringify(inputToEvaluate) : String(inputToEvaluate)}`;

                    const evaluationSchema = {
                        type: "OBJECT",
                        properties: {
                            verdict: { type: "STRING", enum: ["PASS", "FAIL"], description: "The result of the evaluation." },
                            feedback: { type: "STRING", description: "Constructive feedback if verdict is FAIL, otherwise empty." }
                        },
                        required: ["verdict", "feedback"]
                    };


                    // UPDATE: Use the helper function with potential model override
                    const evaluationResult = await callGeminiAPI(evaluationPrompt, evaluationSchema, node.data.model);
                    
                    // Determine output port based on response (0=Pass, 1=Fail)
                    if (evaluationResult.verdict === 'PASS') {
                        output = { index: 0, data: inputToEvaluate };
                    } else if (evaluationResult.verdict === 'FAIL') {
                        output = { index: 1, data: evaluationResult.feedback || "Evaluation Failed (No feedback provided)." };
                    } else {
                        throw new Error(`Evaluator LLM returned invalid verdict: ${evaluationResult.verdict}.`);
                    }
                    break;
                
                
                case 'llm-call':
                    // This handles the generic LLM call node
                    const parts = []; 
                    
                    // Input 1: User Prompt (Text or Structured Multimodal from Chat Interface)
                    if (inputData[1] !== undefined && inputData[1] !== null) {
                        // Handle structured input from chat-interface
                        if (typeof inputData[1] === 'object' && (inputData[1].text || inputData[1].media)) {
                            if (inputData[1].text) {
                                parts.push({text: inputData[1].text});
                            }
                            if (inputData[1].media) {
                                // Handle PDF text extraction if necessary (similar to file-upload logic)
                                if (inputData[1].media.mimeType === 'application/pdf') {
                                    const pdfText = await extractTextFromPDF(inputData[1].media.data);
                                    parts.push({ text: `\n\n[Attached PDF Content]:\n${pdfText}\n[End PDF Content]\n` });
                                } else {
                                    // Handle images and other media types directly supported by Gemini
                                     parts.push({ inlineData: { mimeType: inputData[1].media.mimeType, data: inputData[1].media.data } });
                                }
                            }
                        } 
                        // Handle plain string input
                        else if (typeof inputData[1] === 'string') {
                             parts.push({text: inputData[1]}); 
                        }
                    }
                    
                    // Input 2: Context/File/Media/History (Mixed)
                    if (inputData[2] !== undefined && inputData[2] !== null) {
                        // Handle Base64 Data URLs from Webcam/Drawing/ImageGen
                        if (typeof inputData[2] === 'string' && inputData[2].startsWith('data:')) {
                            const [mimeHeader, data] = inputData[2].split(',');
                            const mimeType = mimeHeader.split(':')[1].split(';')[0];
                            parts.push({ inlineData: { mimeType: mimeType, data: data } });
                        }
                        // Handle file upload objects
                        else if (typeof inputData[2] === 'object' && inputData[2].data && inputData[2].mimeType) {
                             parts.push({ inlineData: { mimeType: inputData[2].mimeType, data: inputData[2].data } });
                        }
                        // Handle History Array (from History Manager)
                        else if (Array.isArray(inputData[2])) {
                            // Format array history into a readable string context for the LLM
                            const historyContext = inputData[2].join('\n');
                            // Only add history context if it's not empty
                            if (historyContext.trim() !== "") {
                                 parts.push({ text: `\n\n--- Conversation History/Context/Feedback ---\n${historyContext}\n--- End History/Context/Feedback ---` });
                            }
                        }
                        // Handle plain text context
                        else if (typeof inputData[2] === 'string') {
                             parts.push({ text: `\n\n--- Context ---\n${inputData[2]}\n--- End Context ---` });
                        }
                    }
                    
                    if (parts.length === 0) {
                        console.log("LLM Call skipped: No User Prompt or Context/Media provided.");
                        output = null;
                        break; 
                    }
                    
                    const payload = { contents: [{ role: "user", parts: parts }] };
                    // Input 0: System Prompt (Optional)
                    if (inputData[0]) payload.contents.unshift({role: "user", parts: [{text: inputData[0]}]}, {role: "model", parts: [{text: "Understood."}]});
                    
                    // UPDATE: Get API configuration based on settings/overrides
                    const llmConfig = getLLMConfig(node.data.model);
                    const apiUrl = llmConfig.url;

                    const response = await fetch(apiUrl, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
                    if (!response.ok) throw new Error(`Gemini API Error (${llmConfig.modelId}): ${response.statusText}`);
                    const result = await response.json(); 
                    if (result.candidates?.[0]?.content) output = result.candidates[0].content.parts[0].text;
                    else throw new Error('No content returned from LLM.');
                    node.el.querySelector('.node-output-preview').textContent = output.substring(0, 200) + (output.length > 200 ? '...' : '');
                    break;
                
                case 'image-gen':
                    if (!inputData[0]) throw new Error("Image Gen requires a prompt input.");
                    const imgPayload = { instances: [{ prompt: inputData[0] }], parameters: { "sampleCount": 1} };
                    
                    // Image generation always uses Imagen (API key logic handled by environment if empty)
                    const apiKey = userGeminiApiKey || "";
                    
                    const imgResponse = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/imagen-3.0-generate-002:predict?key=${apiKey}`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(imgPayload) });
                    if (!imgResponse.ok) throw new Error(`Image API Error: ${imgResponse.statusText}`);
                    const imgResult = await imgResponse.json(); 
                    
                    // Output is a Base64 Data URL string suitable for <img> src
                    if (imgResult.predictions?.[0]?.bytesBase64Encoded) {
                        output = `data:image/png;base64,${imgResult.predictions[0].bytesBase64Encoded}`;
                    }
                    else throw new Error('No image returned from API.');
                    
                    const imgPreview = node.el.querySelector('.node-output-preview');
                    imgPreview.src = output; imgPreview.style.display = 'block';
                    break;

                // --- Logic/Flow Control ---
                
                // UPDATE (NEW): Conditional Logic Execution
                case 'conditional-logic':
                    const inputA_cond = inputData[0];
                    const valueB = node.data.valueB;
                    const operator = node.data.op;
                    let conditionMet = false;

                    // Helper for comparison (handle numbers if possible)
                    const numA = parseFloat(inputA_cond);
                    const numB = parseFloat(valueB);
                    const strA = String(inputA_cond);
                    const strB = String(valueB);

                    switch (operator) {
                        case 'equals': conditionMet = strA === strB; break;
                        case 'not_equals': conditionMet = strA !== strB; break;
                        case 'contains': conditionMet = strA.includes(strB); break;
                        case 'not_contains': conditionMet = !strA.includes(strB); break;
                        case 'gt': conditionMet = (!isNaN(numA) && !isNaN(numB)) ? numA > numB : strA > strB; break;
                        case 'lt': conditionMet = (!isNaN(numA) && !isNaN(numB)) ? numA < numB : strA < strB; break;
                        case 'is_empty': conditionMet = inputA_cond === undefined || inputA_cond === null || strA === ''; break;
                    }
                    
                    // Output the original input to the corresponding port (0=True, 1=False)
                    // We return a structured object { index, data } to signify which port is active.
                    output = {
                        index: conditionMet ? 0 : 1,
                        data: inputA_cond
                    };
                    break;

                // --- UPDATE (NEW): Stop Signal (Goal Reached) ---
                case 'stop-signal':
                    if (inputData[0] !== undefined && inputData[0] !== null) {
                        // If triggered, set the stop flag for the autonomous loop
                        if (isAutonomousMode) {
                            stopAutonomousExecution = true;
                            // Update status immediately for user feedback (this status persists after loop finishes)
                            setStatus('success', 'Goal Reached (Stop Signal)!');
                            showToast("Autonomous flow completed by Stop Signal.", "success");
                        }
                        // In single-run mode, it does nothing special.
                    }
                    output = null; // No output
                    break;


                // --- Integrations ---
                case 'web-request':
                    const { url, method, headers: headerStr } = node.data;
                    if (!url) throw new Error("Web Request URL is missing.");

                    let fetchOptions = { method: method || 'GET' };
                    
                    // Handle Headers
                    let requestHeaders = {};
                    if (headerStr) {
                        try {
                            requestHeaders = JSON.parse(headerStr);
                        } catch (e) {
                            throw new Error("Invalid JSON format in Headers.");
                        }
                    }
                    fetchOptions.headers = requestHeaders;

                    // Handle Body (Input 0)
                    if (inputData[0] && (method === 'POST' || method === 'PUT')) {
                        fetchOptions.body = typeof inputData[0] === 'object' ? JSON.stringify(inputData[0]) : String(inputData[0]);
                    }

                    const webResponse = await fetch(url, fetchOptions);
                    
                    if (!webResponse.ok) {
                        throw new Error(`HTTP error! status: ${webResponse.status}`);
                    }

                    // Try parsing as JSON first, fallback to text
                    const contentType = webResponse.headers.get("content-type");
                    if (contentType && contentType.includes("application/json")) {
                        output = await webResponse.json();
                    } else {
                        output = await webResponse.text();
                    }
                    break;

                case 'web-search':
                    const query = inputData[0];
                    if (!query) throw new Error("Web Search requires a query.");

                    // Simulate search by asking Gemini for a summary (using the helper function)
                    const searchPrompt = `Simulate a web search engine result for the following query. Provide a concise summary (3-5 key points or paragraphs) of the most relevant information available about this topic as if summarizing top search results. Do not include personal opinions or conversational filler. Query: "${query}"`;
                    
                    // UPDATE: Use the helper function with potential model override
                    output = await callGeminiAPI(searchPrompt, null, node.data.model);
                    
                    node.el.querySelector('.node-output-preview').textContent = output.substring(0, 200) + (output.length > 200 ? '...' : '');
                    break;

                // --- Output ---
                case 'display-value': 
                    renderDisplayValueContent(node.el.querySelector('.node-value'), inputData[0]); 
                    output = inputData[0]; 
                    break;
            }
            
            // If execution reaches here without throwing, it's a success
            
            // UPDATE: Handle multi-output nodes (Conditional, Evaluator)
            if (node.type === 'conditional-logic' || node.type === 'ai-evaluator') {
                // Store the structured output object
                node.outputBuffer = output; 
            }
            // Handle standard single output nodes
            else if ((!STATEFUL_NODE_TYPES.includes(node.type) && !CYCLE_BREAKER_TYPES.includes(node.type)) || output !== null) {
                 node.outputBuffer = output; 
            }
           
            node.el.classList.add('success');
            return CYCLE_RESULT.SUCCESS; // UPDATE: Return success status

        } catch(e) {
            // Handle errors specific to node execution
            console.error(`Execution failed for node ${nodeId} (${node.type}):`, e); 
            
            // Only update status and visual error if it's not a user cancellation from a prompt
            if (e.message !== 'Dialog cancelled by user.') {
                setStatus('error', `Error in ${node.type}`); 
                node.el.classList.add('error'); 
                showToast(`Error in ${NODE_DEFINITIONS[node.type].title}: ${e.message}`, 'error'); 
            }
            throw e; // Re-throw to halt the overall flow execution (executeFlowCycle)
        } finally { 
            // Always remove 'active' status when done or failed (unless paused)
            if (!node.el.classList.contains('paused')) {
                 node.el.classList.remove('active'); 
            }
        }
    }

    // Helper function to extract text from PDF (used in file-upload and chat-interface attachments)
    async function extractTextFromPDF(base64Data) {
        const pdfData = atob(base64Data);
        const pdfDoc = await pdfjsLib.getDocument({data: pdfData}).promise;
        let textContent = '';
        for (let i = 1; i <= pdfDoc.numPages; i++) {
            const page = await pdfDoc.getPage(i);
            textContent += (await page.getTextContent()).items.map(s => s.str).join(' ') + '\n';
        }
        return textContent;
    }


    // Handles rendering various data types into the Display Value node, including HTML/Markdown
    function renderDisplayValueContent(element, data) {
        if (!element) return;
        
        // --- UPDATE: Reset Node Size ---
        const nodeEl = element.closest('.node');
        // Get default width from CSS variable defined in :root
        const defaultNodeWidth = getComputedStyle(document.documentElement).getPropertyValue('--default-node-width').trim() || '320px';
        const defaultMinHeight = '150px';

        if (nodeEl) {
            // Reset size before determining new content type
            nodeEl.style.width = defaultNodeWidth;
            element.style.minHeight = defaultMinHeight;
            // Remove class if we had previously expanded it
            nodeEl.classList.remove('expanded-for-html');
        }
        // -----------------------------

        element.innerHTML = '';
        // Reset padding class
        element.classList.remove('rendered-markdown');

        if (data === null || data === undefined) { 
            element.textContent = "N/A"; 
            element.classList.add('rendered-markdown'); // Add padding for N/A text
            return; 
        }
        
        // Handle File/Media objects (e.g., from file upload)
        if (typeof data === 'object' && data.mimeType && data.data) {
            if (data.mimeType === 'application/pdf') { renderPdfInElement(element, `data:application/pdf;base64,${data.data}`, `pdf-viewer-${element.closest('.node').id}`); return; }
            const dataUrl = `data:${data.mimeType};base64,${data.data}`;
            if (data.mimeType.startsWith('image/')) { element.innerHTML = `<img src="${dataUrl}" alt="${data.fileName || 'Image'}">`; return; }
            if (data.mimeType.startsWith('audio/')) { element.innerHTML = `<audio controls src="${dataUrl}" style="width:100%;"></audio>`; return; }
        }
        
        // Handle generated image data URLs (from ImageGen, Webcam, Drawing)
        if (typeof data === 'string' && data.startsWith('data:image')) { element.innerHTML = `<img src="${data}" alt="Generated or Captured Image">`; return; }
        
        // Handle text, numbers, HTML, and markdown
        if (typeof data === 'string' || typeof data === 'number') {
            let content = String(data);
            
            // FIX: Check if the content is wrapped in a markdown code block (e.g., ```html ... ``` or ``` ... ```)
            const codeBlockRegex = /^```(?:\w*\n)?([\s\S]*?)```$/;
            const match = content.trim().match(codeBlockRegex);
            
            if (match && match[1]) {
                // If the entire output is a single code block, extract the content inside.
                content = match[1].trim();
            }

            // UPDATE: Check if content is a full HTML document
            if (content.trim().toLowerCase().startsWith('<!doctype html>') || content.trim().toLowerCase().startsWith('<html')) {
                
                // --- UPDATE: Expand Node for HTML Preview ---
                if (nodeEl) {
                    // Increase size significantly for webpage preview
                    const expandedWidth = 960; // ~3x default width (320px)
                    const expandedMinHeight = 600; // ~4x default min-height (150px)

                    nodeEl.style.width = `${expandedWidth}px`;
                    // Set the height of the content area itself
                    element.style.minHeight = `${expandedMinHeight}px`; 
                    nodeEl.classList.add('expanded-for-html');
                }
                // -------------------------------------------

                // Render in an iframe using srcdoc for isolation
                const iframe = document.createElement('iframe');
                iframe.srcdoc = content;
                
                // Ensure iframe fills the newly resized container
                iframe.style.width = '100%';
                iframe.style.height = '100%'; 
                // Ensure min-height matches the container, otherwise the iframe might collapse if content is short
                iframe.style.minHeight = element.style.minHeight; 
                iframe.style.border = 'none';

                // Note: CSS for .display-value-content iframe is now redundant but harmless
                element.appendChild(iframe);
                return;
            }
            
            // Use marked.parse for non-full-HTML (Markdown or simple HTML snippets/text)
            element.innerHTML = marked.parse(content, {gfm: true, breaks: true}); 
            element.classList.add('rendered-markdown'); // Add padding back for markdown/text content
            return;
        }
        
        // Handle generic objects/arrays (JSON) - e.g., from Sentiment Analysis or JSON Extractor
        if (typeof data === 'object') {
            // Handle History Manager array output specifically for better display
            if (Array.isArray(data)) {
                const formattedHistory = data.map((item, index) => `[${index + 1}]: ${item}`).join('\n\n');
                element.innerHTML = `<pre>${formattedHistory}</pre>`;
                return;
            }
             element.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`; return;
        }
       
    }

    // Functions to handle rendering PDFs within the Display Value node using PDF.js
    function renderPdfInElement(element, pdfDataSource, viewerId) {
        if (!window.pdfjsLib) { element.textContent = "Error: PDF library not loaded."; return; }
        element.innerHTML = `<div class="pdf-controls"><button class="prev-btn">Prev</button><span>Page <span class="page-num">0</span>/<span class="page-count">0</span></span><button class="next-btn">Next</button></div><div class="pdf-canvas-container"><canvas></canvas></div>`;
        const prevBtn = element.querySelector('.prev-btn'), nextBtn = element.querySelector('.next-btn');
        const canvas = element.querySelector('canvas');
        pdfViewerStates[viewerId] = { pdfDoc: null, pageNum: 1, pageRendering: false, pageNumPending: null, canvas: canvas, ctx: canvas.getContext('2d') };
        prevBtn.onclick = () => { if (pdfViewerStates[viewerId].pageNum > 1) { pdfViewerStates[viewerId].pageNum--; queueRenderPage(viewerId); }};
        nextBtn.onclick = () => { if (pdfViewerStates[viewerId].pageNum < pdfViewerStates[viewerId].pdfDoc.numPages) { pdfViewerStates[viewerId].pageNum++; queueRenderPage(viewerId); }};
        
        pdfjsLib.getDocument(pdfDataSource).promise.then(pdfDoc => {
            pdfViewerStates[viewerId].pdfDoc = pdfDoc;
            element.querySelector('.page-count').textContent = pdfDoc.numPages;
            renderPdfPage(viewerId);
        }).catch(err => { console.error("PDF Load Error:", err); element.innerHTML = "Error loading PDF."; });
    }

    function queueRenderPage(viewerId) { 
        const state = pdfViewerStates[viewerId]; 
        if (!state.pageRendering) renderPdfPage(viewerId); else state.pageNumPending = state.pageNum; 
    }

    async function renderPdfPage(viewerId) {
        const state = pdfViewerStates[viewerId]; if (!state || !state.pdfDoc) return;
        state.pageRendering = true;
        const page = await state.pdfDoc.getPage(state.pageNum);
        const viewport = page.getViewport({ scale: state.canvas.parentElement.clientWidth / page.getViewport({scale: 1}).width });
        state.canvas.height = viewport.height; state.canvas.width = viewport.width;
        await page.render({ canvasContext: state.ctx, viewport: viewport }).promise;
        state.pageRendering = false;
        const controls = state.canvas.closest('.display-value-content').querySelector('.pdf-controls');
        if (controls) { 
            controls.querySelector('.page-num').textContent = state.pageNum;
            controls.querySelector('.prev-btn').disabled = state.pageNum <= 1; 
            controls.querySelector('.next-btn').disabled = state.pageNum >= state.pdfDoc.numPages; 
        }
        if (state.pageNumPending !== null) { 
            state.pageNum = state.pageNumPending; state.pageNumPending = null; queueRenderPage(viewerId); 
        }
    }

    // Updates the UI of a node when its data is changed (e.g., by the AI Assistant).
    function updateNode(nodeId, newData) {
        const node = nodes.find(n => n.id === nodeId); if (!node) return;
        Object.assign(node.data, newData);
        const nodeEl = node.el; if (!nodeEl) return;
        
        // Re-initialize or update the node UI based on new data
        switch (node.type) {
            case 'text-input': case 'system-prompt':
                // Specific update for text inputs, as they don't have complex init functions
                const textarea = nodeEl.querySelector('.node-value');
                if (textarea && newData.value !== undefined) {
                    textarea.value = newData.value;
                }
                break;
            // For complex nodes, running the init function again will sync UI with node.data
            case 'math-operation': initMathNode(node); break;
            case 'string-formatter': initStringFormatter(node); break;
            case 'json-parser': initJsonParserNode(node); break;
            case 'code-runner': initCodeRunnerNode(node); break;
            case 'regex-processor': initRegexNode(node); break;
            case 'web-request': initWebRequestNode(node); break;
            case 'text-classification': initTextClassificationNode(node); break;
            case 'json-extractor': initJsonExtractorNode(node); break;
            case 'ai-evaluator': initAIEvaluatorNode(node); break;
        }
        // UPDATE: Also re-init model selector if it exists (e.g. updating an LLM call node)
        if (['llm-call', 'ai-evaluator'].includes(node.type)) {
            initModelSelector(node);
        }
    }

    // Applies changes requested by the AI Assistant (creating/updating nodes and connections).
    function applyCanvasChanges(args) {
        if (args.clear_first) clearCanvas();
        const idMap = {};
        if (args.nodes_to_create) {
            args.nodes_to_create.forEach(nodeDef => {
                const newNode = createNode(nodeDef.type, nodeDef.x, nodeDef.y, nodeDef.data || {});
                if (newNode) idMap[nodeDef.id] = newNode.id;
            });
        }
        if (args.nodes_to_update) args.nodes_to_update.forEach(updateDef => updateNode(updateDef.id, updateDef.data));
        if (args.connections_to_create) {
            args.connections_to_create.forEach(connDef => {
                const fromNodeId = idMap[connDef.from_node_id] || connDef.from_node_id;
                const toNodeId = idMap[connDef.to_node_id] || connDef.to_node_id;
                if(nodes.some(n => n.id === fromNodeId) && nodes.some(n => n.id === toNodeId)) {
                    createConnection(fromNodeId, connDef.from_port_index, toNodeId, connDef.to_port_index);
                }
            });
        }
        updateAllConnections();
    }

    // --- UPDATE: AI Assistant Response Handler (Using Configured Models) ---
    async function getAssistantResponse(thinkingEl) {

        // --- Optimized Node Definitions for Prompt ---
        const NODE_DATA_SCHEMAS = {
            'text-input': { value: 'string (The static text input or initial prompt)' },
            'system-prompt': { value: 'string (MANDATORY: Instructions defining the LLM role, constraints, and output format)' },
            'string-formatter': { template: 'string (Template with {variables})' },
            'math-operation': { op: 'string (add|subtract|etc.)', a: 'number', b: 'number' },
            'json-parser': { path: 'string (e.g., data[0].name)' },
            'code-runner': { code: 'string (JS code. Use inputA, inputB. Must `return`.)' },
            'web-request': { url: 'string', method: 'string (GET|POST)' },
            'text-classification': { categories: 'string (Newline separated categories)' },
            'json-extractor': { schema: 'string (JSON schema definition)' },
            'conditional-logic': { op: 'string (equals|contains|etc.)', valueB: 'string' },
            'ai-evaluator': { criteria: 'string (Rules for PASS/FAIL judgment)'}
        };

        // Generate a concise list of node descriptions and schemas
        const conciseDefs = {};
        Object.entries(NODE_DEFINITIONS).forEach(([key, value]) => {
            let description = `[${key}] ${value.title}: ${value.description}`;
            const schema = NODE_DATA_SCHEMAS[key];
            
            if (schema) {
                description += ` | REQUIRED CONFIG (data): ${JSON.stringify(schema)}`;
            }
            conciseDefs[key] = description;
        });

        const nodeDefinitionsString = Object.entries(conciseDefs).map(([key, desc]) => `- ${desc}`).join('\n');


        // --- System Prompt ---
        const systemPrompt = `You are an expert AI flow assistant. Use the 'update_canvas' tool to build and configure flows based on user requests.

## Instructions:
1. Analyze the request and design the flow (nodes and connections).
2. **CONFIGURATION IS MANDATORY:** If a node requires configuration (see 'REQUIRED CONFIG (data)' below), you MUST provide the 'data' object when calling 'update_canvas'.
   Example: To create a translator agent, you MUST configure 'system-prompt': { "type": "system-prompt", ..., "data": { "value": "Act as a translator..." } }
3. Layout: Flows move left-to-right. Start near x:50, y:50. Space nodes ~350px apart horizontally.

## Autonomous Agents & Loops (CRITICAL):
The engine forbids direct cycles (e.g., LLM -> LLM). To create autonomous agents or feedback loops (e.g., using 'ai-evaluator' for self-correction), you MUST use 'history-manager' to break the cycle.

**Correct Autonomous Loop Pattern:**
1. LLM Output -> Evaluator Input (or next step).
2. Evaluator (Fail/Feedback) -> History Manager (Input 0: Append).
3. History Manager (Output 0: History Array) -> LLM (Input 2: Context/History).
4. Use 'stop-signal' connected to Evaluator (Pass) to define the goal.

## Available Nodes & Configuration:
${nodeDefinitionsString}

## Current canvas state: 
${JSON.stringify(getCanvasState(), null, 2)}`;

        const tools = [{ functionDeclarations: [{ name: "update_canvas", description: "Modifies the canvas by creating/updating nodes and connections.", parameters: { type: "OBJECT", properties: {
            clear_first: { type: "BOOLEAN", description: "If true, clears the canvas before adding new elements. Use this for new requests." },
            nodes_to_create: { type: "ARRAY", items: { type: "OBJECT", properties: { 
                id: { type: "STRING", description: "Temporary ID for referencing in connections" }, 
                type: { type: "STRING" }, 
                x: { type: "NUMBER" }, 
                y: { type: "NUMBER" }, 
                data: { type: "OBJECT", description: "Configuration data for the node (see schema in system prompt)" } 
            }}},
            nodes_to_update: { type: "ARRAY", items: { type: "OBJECT", properties: { 
                id: { type: "STRING", description: "Existing Node ID" }, 
                data: { type: "OBJECT" }
            }}},
            connections_to_create: { type: "ARRAY", items: { type: "OBJECT", properties: { 
                from_node_id: { type: "STRING" }, 
                from_port_index: { type: "NUMBER" }, 
                to_node_id: { type: "STRING" }, 
                to_port_index: { type: "NUMBER" }
            }}}
        }}}] }];

        // UPDATE: Use the global LLM configuration for the AI Assistant
        const assistantConfig = getLLMConfig();
        const apiUrl = assistantConfig.url;
        
        const payload = { contents: [ ...chatHistory ], tools: tools, systemInstruction: { parts: [{ text: systemPrompt }] } };
        
        try {
            const response = await fetch(apiUrl, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
            });

            // Check for HTTP errors
            if (!response.ok) {
                const errorBody = await response.text();
                console.error("API Error Response Body:", errorBody);
                if (errorBody.includes("context_length_exceeded") || response.status === 400) {
                     throw new Error(`API Error: Prompt might be too long or complex (${response.status}). Try a simpler request.`);
                }
                throw new Error(`API Error: ${response.status} ${response.statusText}`);
            }
            
            const result = await response.json();
            
            thinkingEl.remove();
            const candidate = result.candidates?.[0];

             // Check if the response is valid and contains content parts
            if (!candidate?.content?.parts) {
                // Log the actual result for debugging if it's invalid
                console.error("Invalid or empty response from AI:", result);

                // Check for specific issues like safety blocks or prompt feedback
                if (candidate?.finishReason === 'SAFETY' || result.promptFeedback?.blockReason === 'SAFETY') {
                     throw new Error("AI response blocked by safety filters.");
                }

                // Generic error message if response structure is missing
                throw new Error("Invalid response structure from AI.");
            }

            let assistantResponseText = "I've made the requested changes.";
            let toolCallMade = false;
            candidate.content.parts.forEach(part => {
                if (part.functionCall?.name === 'update_canvas') {
                     applyCanvasChanges(part.functionCall.args);
                     toolCallMade = true;
                }
            });

            const textPart = candidate.content.parts.find(p => p.text);
            if (textPart) assistantResponseText = textPart.text;
            else if (!toolCallMade) assistantResponseText = "I couldn't determine how to modify the canvas from that. Could you rephrase?";
            
            addChatMessage(assistantResponseText, 'assistant');
            chatHistory.push(candidate.content); 
        } catch (err) {
            console.error("Assistant API error:", err);
            thinkingEl.remove();
            // Display the enhanced error message
            addChatMessage(`Sorry, I encountered an error: ${err.message}.`, "assistant");
        }
    }

    // --- Initialization ---
    async function init() {
        await initializeFirebase();
        populateNodeLibrary();
        populateModulesMenu();
        
        // UPDATE: Load the reflection loop by default to showcase the improvements
        loadModule('reflection-agent-loop'); 
        // Set autonomous mode ON by default for this module
        autonomousToggle.checked = true;
        isAutonomousMode = true;

        updateTransform();

        // Event Listeners
        aiChatFab.addEventListener('click', () => toggleChat(true));
        closeChatBtn.addEventListener('click', () => toggleChat(false));
        chatForm.addEventListener('submit', handleChatSubmit);
        saveFlowBtn.addEventListener('click', saveFlow);
        loadFlowBtn.addEventListener('click', showLoadFlowDialog);
        // UPDATE: Add Settings Listener
        settingsBtn.addEventListener('click', showSettingsModal);
    }

    init();
</script>
