    // --- Firebase Integration (Save/Load) ---
    // Initializes Firebase authentication and database connection.
    async function initializeFirebase() {
        if (!firebaseConfig) {
            console.warn("Firebase config not found. Save/Load disabled.");
            setStatus('ready', 'Local Mode');
            return;
        }

        try {
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);

            setStatus('ready', 'Authenticating...');

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    userId = user.uid;
                    console.log("Authenticated with user ID:", userId);
                    setStatus('ready', 'Ready');
                    saveFlowBtn.disabled = false;
                    loadFlowBtn.disabled = false;
                } else {
                    userId = null;
                    console.log("User is signed out.");
                    setStatus('ready', 'Auth Failed');
                    saveFlowBtn.disabled = true;
                    loadFlowBtn.disabled = true;
                }
            });

            const initialAuthToken = typeof __initial_auth_token !== 'undefined' ? __initial_auth_token : null;
            if (initialAuthToken) {
                await signInWithCustomToken(auth, initialAuthToken);
            } else {
                await signInAnonymously(auth);
            }

        } catch (error) {
            console.error("Firebase initialization failed:", error);
            showToast("Could not connect to cloud storage.", "error");
            saveFlowBtn.disabled = true;
            loadFlowBtn.disabled = true;
            setStatus('error', 'Storage Error');
        }
    }
    
    // Serializes the current state of the canvas (nodes, connections, camera) for saving.
    function serializeFlow() {
         const serializedNodes = nodes.map(node => ({
            id: node.id,
            type: node.type,
            x: node.el.offsetLeft,
            y: node.el.offsetTop,
            data: node.data,
        }));

        // Save a clean version of connections without references to DOM elements
        const serializedConnections = connections.map(c => ({
            fromNode: c.fromNode,
            fromPortIndex: c.fromPortIndex,
            toNode: c.toNode,
            toPortIndex: c.toPortIndex,
        }));
        
        return {
            nodes: serializedNodes,
            connections: serializedConnections,
            panZoom, // Save camera position
            createdAt: serverTimestamp() 
        };
    }

    /**
     * Shows a custom modal dialog. Used for saving flows and getting user input.
     * Replaces native browser prompt()/alert(), which are often blocked.
     * @param {string} title The dialog title.
     * @param {string} message The main content/prompt message (can be pre-formatted text).
     * @param {boolean} showInput Whether to show a text input field.
     * @returns {Promise<string>} A promise that resolves with the input value (or confirmation) or rejects if cancelled.
     */
    function showModalDialog(title, message, showInput = true) {
        return new Promise((resolve, reject) => {
            // Generate a unique ID for the dialog to manage potential overlaps
            const dialogId = `modal-dialog-${Date.now()}`;
            
            // Remove any existing dialogs with the same ID (just in case)
            let existingDialog = document.getElementById(dialogId);
            if (existingDialog) {
                existingDialog.remove();
            }

            const dialog = document.createElement('div');
            dialog.id = dialogId;
            dialog.className = 'modal-dialog';

            const closeDialog = () => {
                if (document.body.contains(dialog)) {
                    document.body.removeChild(dialog);
                }
            };

            // Note: The <p> tag styling in CSS now supports white-space: pre-wrap for chat history
            dialog.innerHTML = `
                <h3>${title}</h3>
                <p>${message}</p>
                ${showInput ? `<input type="text" id="${dialogId}-input" placeholder="Enter value..." style="background-color: var(--input-bg); border: 1px solid var(--input-border); color: var(--primary-text); border-radius: 4px; padding: 8px; font-family: var(--font-ui); font-size: 1em; width: 100%;">` : ''}
                <div class="modal-actions">
                    <button id="${dialogId}-cancel-btn" class="btn-cancel">Cancel</button>
                    <button id="${dialogId}-confirm-btn" class="btn-confirm">${showInput ? 'Submit' : 'OK'}</button>
                </div>
            `;

            document.body.appendChild(dialog);
            
            const input = dialog.querySelector(`#${dialogId}-input`);
            if (input) input.focus();

            dialog.querySelector(`#${dialogId}-confirm-btn`).addEventListener('click', () => {
                const value = input ? input.value.trim() : true;
                
                resolve(value);
                closeDialog();
            });

            dialog.querySelector(`#${dialogId}-cancel-btn`).addEventListener('click', () => {
                reject('Dialog cancelled by user.');
                closeDialog();
            });

            if (input) {
                input.addEventListener('keydown', (e) => {
                    if (e.key === 'Enter') {
                        dialog.querySelector(`#${dialogId}-confirm-btn`).click();
                    } else if (e.key === 'Escape') {
                        dialog.querySelector(`#${dialogId}-cancel-btn`).click();
                    }
                });
            }
        });
    }


    async function saveFlow() {
        if (!userId || !db) {
            showToast("Not authenticated. Cannot save flow.", "error");
            return;
        }

        let flowName;
        try {
            // Use the new unified modal dialog for saving
            flowName = await showModalDialog("Save Flow", "Please enter a name for your flow.", true);
        } catch (err) {
            console.log(err); // Log cancellation message, e.g., "Dialog cancelled by user."
            return; // Stop execution if the user cancels
        }
        
        if (!flowName) return; // Safeguard if promise resolves empty

        saveFlowBtn.disabled = true;
        setStatus('running', 'Saving...');

        try {
            const flowData = serializeFlow();
            const flowDocRef = doc(db, "artifacts", appId, "users", userId, "flows", flowName);
            await setDoc(flowDocRef, flowData);
            showToast(`Flow "${flowName}" saved successfully!`);
        } catch (error) {
            console.error("Error saving flow:", error);
            showToast("Failed to save flow.", "error");
        } finally {
            saveFlowBtn.disabled = false;
            // Do not reset status to Ready if execution is ongoing
            if (!isExecuting) {
                setStatus('ready', 'Ready');
            }
        }
    }
    
    // Displays a dialog listing saved flows from Firestore and allows the user to select one to load.
    async function showLoadFlowDialog() {
         if (!userId || !db) {
            showToast("Not authenticated. Cannot load flows.", "error");
            return;
        }

        loadFlowBtn.disabled = true;
        setStatus('running', 'Loading...');

        try {
            const flowsCollectionRef = collection(db, "artifacts", appId, "users", userId, "flows");
            const querySnapshot = await getDocs(flowsCollectionRef);
            
            const savedFlows = [];
            querySnapshot.forEach((doc) => {
                savedFlows.push({ id: doc.id, ...doc.data() });
            });

            if (savedFlows.length === 0) {
                showToast("No saved flows found.");
                return;
            }

            // Create a modal/dialog to display saved flows (Using modal-dialog class for consistency)
            const dialog = document.createElement('div');
            dialog.className = 'modal-dialog';
            dialog.style.width = '500px'; // Make wider for list view

            let listHtml = `
                <h3>Select a Flow to Load</h3>
                <div style="max-height: 60vh; overflow-y: auto; margin-bottom: 20px;">`;

            // Sorting in JS as Firestore orderBy might require indexes
            savedFlows.sort((a, b) => {
                const timeA = a.createdAt?.toMillis ? a.createdAt.toMillis() : 0;
                const timeB = b.createdAt?.toMillis ? b.createdAt.toMillis() : 0;
                return timeB - timeA; // Sort newest first
            }); 

            savedFlows.forEach(flow => {
                const date = flow.createdAt?.toDate ? flow.createdAt.toDate().toLocaleString() : 'N/A';
                listHtml += `<div class="load-flow-item" data-flow-id="${flow.id}" style="padding: 12px; border-radius: 8px; cursor: pointer; border-bottom: 1px solid var(--node-border);">
                                <strong style="color: var(--primary-text);">${flow.id}</strong>
                                <br><small style="color: var(--secondary-text);">Saved: ${date}</small>
                            </div>`;
            });
            
            listHtml += `</div><div class="modal-actions"><button id="close-load-dialog" class="btn-cancel">Cancel</button></div>`;
            
            dialog.innerHTML = listHtml;
            document.body.appendChild(dialog);

            dialog.querySelectorAll('.load-flow-item').forEach(item => {
                item.addEventListener('mouseenter', () => item.style.backgroundColor = 'var(--button-hover-bg)');
                item.addEventListener('mouseleave', () => item.style.backgroundColor = 'transparent');
                item.addEventListener('click', async (e) => {
                    const flowId = e.currentTarget.dataset.flowId;
                    const flowData = savedFlows.find(f => f.id === flowId);
                    if (flowData) {
                        loadFlow(flowData, flowId);
                    }
                    document.body.removeChild(dialog);
                });
            });
            
            dialog.querySelector('#close-load-dialog').addEventListener('click', () => document.body.removeChild(dialog));

        } catch (error) {
            console.error("Error loading flows:", error);
            showToast("Failed to fetch saved flows.", "error");
        } finally {
            loadFlowBtn.disabled = false;
            // Do not reset status to Ready if execution is ongoing
            if (!isExecuting) {
                 setStatus('ready', 'Ready');
            }
        }
    }

            type, 
            // Clone definitions to allow dynamic changes (e.g., String Formatter)
            inputs: JSON.parse(JSON.stringify(def.inputs || [])), 
            outputs: JSON.parse(JSON.stringify(def.outputs || [])), 
            data: JSON.parse(JSON.stringify(data)), 
            internalState: {},
            outputBuffer: null // Storage for the output after execution
        };
        
        const nodeEl = document.createElement('div');
        nodeEl.className = 'node'; nodeEl.id = nodeId;
        
        // Feature: Snap to grid if enabled during creation (e.g., drag/drop or loading)
        const finalX = snapToGrid ? Math.round(x / GRID_SIZE) * GRID_SIZE : x;
        const finalY = snapToGrid ? Math.round(y / GRID_SIZE) * GRID_SIZE : y;
        
        nodeEl.style.left = `${finalX}px`; 
        nodeEl.style.top = `${finalY}px`;

        // Build the HTML structure
        nodeEl.innerHTML = `
            <div class="node-header">
                <div class="node-header-title"><span class="material-symbols-outlined">${def.icon}</span><span>${def.title}</span></div>
                <button class="delete-node-btn"><span class="material-symbols-outlined">close</span></button>
            </div>
            <div class="node-content">${def.content(node)}</div>`;
        
        // Feature: Add Copy button if the node content has .output-with-copy
        if (nodeEl.querySelector('.output-with-copy')) {
            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-output-btn';
            copyBtn.innerHTML = '<span class="material-symbols-outlined" style="font-size: 18px;">content_copy</span>';
            copyBtn.title = 'Copy Output';
            copyBtn.addEventListener('click', () => copyNodeOutput(node));
            nodeEl.querySelector('.node-content').appendChild(copyBtn);
        }

        canvasWrapper.appendChild(nodeEl);
        node.el = nodeEl;
        nodes.push(node);
        
        // Add event listeners for interaction
        nodeEl.querySelector('.delete-node-btn').addEventListener('click', () => deleteNode(nodeId));
        
        // Prevent dragging when interacting with the chat interface input/buttons
        if (type !== 'chat-interface') {
             nodeEl.querySelector('.node-header').addEventListener('mousedown', (e) => startNodeDrag(e, node));
        } else {
            // Allow dragging only by the header for chat-interface
             nodeEl.querySelector('.node-header').addEventListener('mousedown', (e) => startNodeDrag(e, node));
        }
       
        
        // Initialize IO ports (needed after initial content render for some dynamic nodes)
        rebuildNodeIO(node);

        // Type-specific initialization logic
        if (type === 'file-upload') { nodeEl.querySelector(`#file-upload-${nodeId}`).addEventListener('change', (e) => handleFileSelect(e, node)); }
        if (type === 'string-formatter') { initStringFormatter(node); }
        if (type === 'webcam-capture') { initWebcamNode(node); }
        if (type === 'audio-recorder') { initAudioNode(node); }
        if (type === 'drawing-canvas') { initDrawingNode(node); }
        if (type === 'math-operation') { initMathNode(node); }
        if (type === 'json-parser') { initJsonParserNode(node); }
        if (type === 'code-runner') { initCodeRunnerNode(node); }
        if (type === 'regex-processor') { initRegexNode(node); }
        if (type === 'web-request') { initWebRequestNode(node); }
        if (type === 'text-classification') { initTextClassificationNode(node); }
        if (type === 'json-extractor') { initJsonExtractorNode(node); }
        if (type === 'conditional-logic') { initConditionalNode(node); }
        if (type === 'history-manager') { initHistoryManagerNode(node); }
        if (type === 'chat-interface') { initChatInterfaceNode(node); }
        
        // UPDATE: Initialize AI Evaluator Node and Model Selector for LLM nodes
        if (type === 'ai-evaluator') { 
            initAIEvaluatorNode(node); 
            initModelSelector(node);
        }
        if (type === 'llm-call') {
            initModelSelector(node);
        }

        return node;
    }

    // Feature: Copy Node Output to clipboard
    function copyNodeOutput(node) {
        let dataToCopy = node.outputBuffer;

        if (node.type === 'conditional-logic' || node.type === 'ai-evaluator') {
            if (dataToCopy && typeof dataToCopy === 'object' && dataToCopy.hasOwnProperty('data')) {
                dataToCopy = dataToCopy.data;
            }
        }

        if (dataToCopy !== null && dataToCopy !== undefined) {
            let textToCopy;
            if (typeof dataToCopy === 'object') {
                // Handle complex objects like file data if necessary, but usually we copy the string representation
                textToCopy = JSON.stringify(dataToCopy, null, 2);
            } else {
                textToCopy = String(dataToCopy);
            }

            // Use textarea fallback for clipboard access in restrictive environments
            const textArea = document.createElement("textarea");
            textArea.value = textToCopy;
            document.body.appendChild(textArea);
            textArea.focus();
            textArea.select();
            try {
                document.execCommand('copy');
                showToast("Output copied to clipboard!");
            } catch (err) {
                showToast("Failed to copy output.", "error");
            }
            document.body.removeChild(textArea);
        } else {
            showToast("No output available to copy yet.", "error");
        }
    }


    // Renders the input/output ports for a node (used on creation and when inputs change dynamically)
    function rebuildNodeIO(node) {
         const content = node.el.querySelector('.node-content');
         
         // Check if IO ports already exist (important for nodes like chat-interface where content isn't wiped)
        if (node.el.querySelector('.node-io')) return;


         let ioHtml = '';
         (node.inputs || []).forEach((input, i) => { 
             const name = input.label || input.name;
             const tooltip = `${name} (${input.dataType || 'any'})`;
             ioHtml += `<div class="node-io"><div id="${node.id}_in_${i}" class="io-port input" data-port-index="${i}" title="${tooltip}"></div><label class="io-label">${name}</label></div>`; 
         });
         (node.outputs || []).forEach((output, i) => { 
             const name = output.label || output.name;
             const tooltip = `${name} (${output.dataType || 'any'})`;
             ioHtml += `<div class="node-io"><div id="${node.id}_out_${i}" class="io-port output" data-port-index="${i}" title="${tooltip}"></div><label class="io-label">${name}</label></div>`; 
         });
         content.insertAdjacentHTML('beforeend', ioHtml);
         
         // Re-attach connection listeners
         node.el.querySelectorAll('.io-port.output').forEach((portEl) => portEl.addEventListener('mousedown', (e) => startConnection(e, node, parseInt(portEl.dataset.portIndex))));
         node.el.querySelectorAll('.io-port.input').forEach((portEl) => portEl.addEventListener('mouseup', (e) => endConnection(node, parseInt(portEl.dataset.portIndex))));
         
         // If connections rely on these ports, update their visualization
         updateAllConnections();
    }
    
    // Removes a node and its associated connections
    const deleteNode = (nodeId) => {
        const nodeIndex = nodes.findIndex(n => n.id === nodeId); if (nodeIndex === -1) return;
        
        // Remove connections associated with this node
        connections = connections.filter(c => { 
            if(c.fromNode === nodeId || c.toNode === nodeId) { 
                document.getElementById(c.id)?.remove(); 
                return false; 
            } 
            return true; 
        });
        
        nodes[nodeIndex].el.remove(); 
        nodes.splice(nodeIndex, 1);
    }

    // Calculates the coordinates of a port relative to the canvas wrapper
    const getPortCoords = (portEl) => { 
        const node = portEl.closest('.node'); 
        // Calculate position including the offset of the port relative to the node
        return { 
            x: node.offsetLeft + portEl.offsetLeft + portEl.offsetWidth / 2, 
            y: node.offsetTop + portEl.offsetTop + portEl.offsetHeight / 2 
        }; 
    }

    // Draws or updates a connection path (SVG Bezier curve)
    const drawConnection = (pathId, start, end, status = '') => {
        let path = document.getElementById(pathId);
        if (!path) { 
            path = document.createElementNS('http://www.w3.org/2000/svg', 'path'); 
            path.setAttribute('id', pathId); 
            svgConnections.appendChild(path); 
            // Feature: Add click listener for selection/deletion
            if (pathId !== 'potential-connection') {
                path.addEventListener('click', (e) => selectConnection(e, pathId));
            }
        }
        // Maintain 'selected' class if it exists, while adding/removing other statuses
        const isSelected = path.classList.contains('selected');
        path.setAttribute('class', `connection-path ${status} ${isSelected ? 'selected' : ''}`);
        
        // Smoother Bezier curve calculation
        const tension = 0.6;
        // Calculate control points based on distance for a smoother curve
        const controlOffset = Math.max(50, Math.abs(end.x - start.x) * tension);
        const controlX1 = start.x + controlOffset;
        const controlX2 = end.x - controlOffset;

        path.setAttribute('d', `M ${start.x} ${start.y} C ${controlX1} ${start.y}, ${controlX2} ${end.y}, ${end.x} ${end.y}`);
    }

    // Updates the position of all existing connections (called when nodes move)
    const updateAllConnections = () => {
        connections.forEach(c => { 
            const start = document.getElementById(c.fromPortId); 
            const end = document.getElementById(c.toPortId); 
            if (start && end) {
                // Preserve 'active' status if it exists
                const currentPath = document.getElementById(c.id);
                const isActive = currentPath ? currentPath.classList.contains('active') : false;
                drawConnection(c.id, getPortCoords(start), getPortCoords(end), isActive ? 'active' : '');
            }
        });
    }

    // --- Interactivity: Drag, Pan, Zoom, Connect ---
    
    // Feature: Connection Selection and Deletion
    function selectConnection(e, connectionId) {
        e.stopPropagation(); // Prevent canvas interaction
        // Deselect any previously selected connection
        document.querySelectorAll('.connection-path.selected').forEach(p => p.classList.remove('selected'));
        
        selectedConnectionId = connectionId;
        const path = document.getElementById(connectionId);
        if (path) {
            path.classList.add('selected');
        }
    }

    document.addEventListener('keydown', (e) => {
        // Ensure we are not typing in an input field
        if (document.activeElement.tagName === 'INPUT' || document.activeElement.tagName === 'TEXTAREA') {
            return;
        }

        if ((e.key === 'Delete' || e.key === 'Backspace') && selectedConnectionId) {
            deleteConnection(selectedConnectionId);
            selectedConnectionId = null;
        }
    });

    function deleteConnection(connectionId) {
        const index = connections.findIndex(c => c.id === connectionId);
        if (index > -1) {
            connections.splice(index, 1);
            document.getElementById(connectionId)?.remove();
        }
    }


    // Node dragging handlers
    const startNodeDrag = (e, node) => { 
        // Prevent panning when starting drag on a node header
        e.stopPropagation(); 
        activeNode = node; 
        nodeDragStart.x = e.clientX; 
        nodeDragStart.y = e.clientY; 
        // Bring node to front
        node.el.style.zIndex = 20;
        nodes.forEach(n => { if (n.id !== node.id) n.el.style.zIndex = 10; });
        // Deselect connection if dragging a node
        if (selectedConnectionId) {
            document.getElementById(selectedConnectionId)?.classList.remove('selected');
            selectedConnectionId = null;
        }

    };
    
    // Canvas panning handlers
    const startCanvasPan = (e) => { 
        isPanning = true; 
        dragStart.x = e.clientX - panZoom.x; 
        dragStart.y = e.clientY - panZoom.y; 
        document.body.classList.add('grabbing'); 
         // Deselect connection when clicking canvas
         if (selectedConnectionId) {
            document.getElementById(selectedConnectionId)?.classList.remove('selected');
            selectedConnectionId = null;
        }
    };
    
    // Start panning only if clicking the background canvas
    canvas.addEventListener('mousedown', (e) => { 
        if (e.target.id === 'node-canvas' || e.target.id === 'canvas-wrapper' || e.target.closest('svg#connections-layer')) {
            startCanvasPan(e);
        }
    });
    
    // Global mouse move handler for panning, dragging nodes, and drawing connections
    document.addEventListener('mousemove', (e) => {
        if (isPanning) {
            // Panning the canvas
            panZoom.x = e.clientX - dragStart.x; 
            panZoom.y = e.clientY - dragStart.y; 
            updateTransform(); 
        }
        else if (activeNode) {
            // Dragging a node
            // Calculate movement scaled by zoom level
            const dx = (e.clientX - nodeDragStart.x) / panZoom.scale;
            const dy = (e.clientY - nodeDragStart.y) / panZoom.scale;
            
            let newX = activeNode.el.offsetLeft + dx;
            let newY = activeNode.el.offsetTop + dy;

            // Feature: Snap to Grid logic
            if (snapToGrid) {
                newX = Math.round(newX / GRID_SIZE) * GRID_SIZE;
                newY = Math.round(newY / GRID_SIZE) * GRID_SIZE;
            }

            activeNode.el.style.left = `${newX}px`; 
            activeNode.el.style.top = `${newY}px`;
            
            nodeDragStart = { x: e.clientX, y: e.clientY }; 
            // Update connections attached to the moving node
            updateAllConnections(); 
        } else if (isConnecting) {
            // Drawing a potential connection line
            const startCoords = getPortCoords(connectionStartPort.el); 
            const r = canvas.getBoundingClientRect();
            // Calculate end coordinates relative to the zoomed/panned canvas wrapper
            const endCoords = { 
                x: (e.clientX - r.left - panZoom.x) / panZoom.scale, 
                y: (e.clientY - r.top - panZoom.y) / panZoom.scale 
            };
            
            drawConnection('potential-connection', startCoords, endCoords, 'potential');
        }
    });
    
    // Global mouse up handler to stop interactions
    document.addEventListener('mouseup', (e) => {
        if (isConnecting) {
            const potential = document.getElementById('potential-connection');
            // If we didn't land on a valid input port (which is handled by endConnection), remove the line.
            if (!e.target.classList.contains('io-port') || !e.target.classList.contains('input')) {
                potential?.remove();
            }
        }
        
        isPanning = false; 
        activeNode = null; 
        isConnecting = false; 
        document.body.classList.remove('grabbing');
    });
    
    // Zoom and Pan via mouse wheel
    canvas.addEventListener('wheel', (e) => {
        
        if (e.target.closest('.node-chat-messages') || e.target.closest('.display-value-content') || e.target.tagName === 'IFRAME') {
            // Do not prevent default, allow the area to scroll naturally.
            return; 
        }

        e.preventDefault();
        // If Ctrl/Cmd key is NOT pressed, pan the canvas
        if (!e.ctrlKey && !e.metaKey) { 
            panZoom.x -= e.deltaX; 
            panZoom.y -= e.deltaY; 
            updateTransform(); 
            return; 
        }
        
        // If Ctrl/Cmd key IS pressed, zoom the canvas
        const delta = e.deltaY > 0 ? -1 : 1;
        const newScale = Math.max(MIN_ZOOM, Math.min(MAX_ZOOM, panZoom.scale + delta * 0.1));
        
        // Zoom towards the cursor position
        const r = canvas.getBoundingClientRect();
        const mx = e.clientX - r.left;
        const my = e.clientY - r.top;
        
        // Adjust pan position to maintain cursor focus during zoom
        panZoom.x = mx - (mx - panZoom.x) * (newScale / panZoom.scale); 
        panZoom.y = my - (my - panZoom.y) * (newScale / panZoom.scale);
        panZoom.scale = newScale; 
        updateTransform();
    });
    
    // Drag and Drop from Node Library
    canvas.addEventListener('dragover', (e) => { e.preventDefault(); });
    canvas.addEventListener('drop', (e) => {
        e.preventDefault();
        const nodeType = e.dataTransfer.getData('text/plain');
        if (!NODE_DEFINITIONS[nodeType]) return;
        
        const rect = canvas.getBoundingClientRect();
        // Calculate drop position relative to the zoomed/panned canvas wrapper
        const x = (e.clientX - rect.left - panZoom.x) / panZoom.scale;
        const y = (e.clientY - rect.top - panZoom.y) / panZoom.scale;
        createNode(nodeType, x, y);
    });

    // Connection Logic
    function startConnection(e, node, portIndex) { 
        e.stopPropagation(); // Prevent canvas panning
        isConnecting = true; 
        connectionStartPort = { el: e.target, node, portIndex }; 
        // Create the potential connection path element
        let path = document.getElementById('potential-connection'); 
        if (!path) { 
            path = document.createElementNS('http://www.w3.org/2000/svg', 'path'); 
            path.id = 'potential-connection'; 
            svgConnections.appendChild(path); 
        }
    }

    function endConnection(endNode, endPortIndex) {
        if (!isConnecting) return;

        // Prevent connecting a node to itself
        if (connectionStartPort.node.id === endNode.id) {
            showToast("Cannot connect a node to itself.", "error");
            return;
        }
        
        const toPortId = `${endNode.id}_in_${endPortIndex}`;
        
        // Check if the input port is already connected
        if (connections.some(c => c.toPortId === toPortId)) { 
            showToast("Input port is already connected.", "error"); 
            return; 
        }
        
        // Create the connection
        createConnection(connectionStartPort.node.id, connectionStartPort.portIndex, endNode.id, endPortIndex);
        
        // Cleanup potential connection line and reset state
        document.getElementById('potential-connection')?.remove(); 
        updateAllConnections(); 
        isConnecting = false;
    }

    function createConnection(fromNodeId, fromPortIndex, toNodeId, toPortIndex) {
        const fromPortId = `${fromNodeId}_out_${fromPortIndex}`; 
        const toPortId = `${toNodeId}_in_${toPortIndex}`;
        const connId = `conn_${fromNodeId}_${fromPortIndex}_to_${toNodeId}_${toPortIndex}`;
        
        // Prevent duplicate connections
        if (connections.some(c => c.id === connId)) return;
        
        connections.push({ id: connId, fromNode: fromNodeId, fromPortIndex, fromPortId, toNode: toNodeId, toPortIndex, toPortId });
    }
    
    // --- UI & Controls (Toast, Status, Zoom, Dropdowns, Library, Settings) ---
    let toastTimeout;
    const showToast = (message, type = 'info') => { 
        toastEl.textContent = message; 
        toastEl.className = `toast show ${type}`; 
        clearTimeout(toastTimeout); 
        toastTimeout = setTimeout(() => toastEl.classList.remove('show'), 3000); 
    };
    
    const setStatus = (state, text) => { 
        statusDot.className = `status-dot ${state}`; // Ensure base class is present
        statusText.textContent = text; 
    };
    
    zoomInBtn.addEventListener('click', () => { panZoom.scale = Math.min(MAX_ZOOM, panZoom.scale * 1.2); updateTransform(); });
    zoomOutBtn.addEventListener('click', () => { panZoom.scale = Math.max(MIN_ZOOM, panZoom.scale / 1.2); updateTransform(); });
    
    // Feature: Snap to Grid Toggle
    snapGridBtn.addEventListener('click', () => {
        snapToGrid = !snapToGrid;
        snapGridBtn.classList.toggle('active', snapToGrid);
    });

    // --- UPDATE: Settings Modal Handler ---

    // Feature: Populates the side panel with categorized, draggable node types
    function populateNodeLibrary() {
        nodeLibraryList.innerHTML = '';
        const categories = {};

        // Group definitions by category
        for (const type in NODE_DEFINITIONS) {
            const def = NODE_DEFINITIONS[type];
            const category = def.category || 'Uncategorized';
            if (!categories[category]) {
                categories[category] = [];
            }
            categories[category].push({ type, ...def });
        }

        // Define desired order for categories
        const orderedCategories = ['Inputs/Media', 'User Interaction', 'AI/Logic', 'Logic', 'Text Processing', 'Integrations', 'Utilities', 'Data Processing', 'Output'];

        // Render categories and nodes in order
        orderedCategories.forEach(categoryName => {
            if (!categories[categoryName]) return;

            const header = document.createElement('div');
            header.className = 'category-header';
            header.innerHTML = `<span>${categoryName}</span><span class="material-symbols-outlined">expand_less</span>`;
            
            const content = document.createElement('div');
            content.className = 'category-content';

            header.addEventListener('click', () => {
                content.classList.toggle('collapsed');
                header.querySelector('.material-symbols-outlined').textContent = content.classList.contains('collapsed') ? 'expand_more' : 'expand_less';
            });

            categories[categoryName].forEach(def => {
                const card = document.createElement('div');
                card.className = 'node-card';
                card.draggable = true;
                card.innerHTML = `<span class="material-symbols-outlined">${def.icon}</span> <span>${def.title}</span>`;
                card.addEventListener('dragstart', (e) => { e.dataTransfer.setData('text/plain', def.type); });
                content.appendChild(card);
            });

            nodeLibraryList.appendChild(header);
            nodeLibraryList.appendChild(content);
        });
    }

    // Loads a flow definition (either from a module or a saved file) onto the canvas.
    function loadFlow(flowDefinition, flowName) {
        clearCanvas();
        
        const nodeMap = {};
        // 1. Create nodes, preserving IDs if they exist (from saved flows)
        flowDefinition.nodes.forEach(nodeDef => {
            const newNode = createNode(nodeDef.type, nodeDef.x, nodeDef.y, nodeDef.data, nodeDef.id || null);
            // If loading from modules (which use index-based IDs), map index to new ID
            if (nodeDef.id === undefined) {
                nodeMap[flowDefinition.nodes.indexOf(nodeDef)] = newNode;
            } else {
                nodeMap[nodeDef.id] = newNode;
            }
        });
        
        // 2. Create connections
        flowDefinition.connections.forEach(c => {
            let fromNode, toNode;
            let fromPortIndex = c.fromPortIndex !== undefined ? c.fromPortIndex : c.fromPort;
            let toPortIndex = c.toPortIndex !== undefined ? c.toPortIndex : c.toPort;

            // Determine source/target nodes based on saved ID or module index
            if (c.fromNode && c.toNode) { 
                fromNode = nodeMap[c.fromNode];
                toNode = nodeMap[c.toNode];
            } else {
                fromNode = nodeMap[c.from];
                toNode = nodeMap[c.to];
            }

            if (fromNode && toNode) {
                // Handle dynamic input mapping for modules (e.g., String Formatter)
                if (c.toPortName) {
                    const dynamicIndex = toNode.inputs.findIndex(input => input.name === c.toPortName);
                    if (dynamicIndex !== -1) toPortIndex = dynamicIndex;
                }
                createConnection(fromNode.id, fromPortIndex, toNode.id, toPortIndex);
            }
        });
        
        updateAllConnections();
        
        if (flowDefinition.panZoom) {
            Object.assign(panZoom, flowDefinition.panZoom);
            updateTransform();
        }
        modulesDropdownBtn.querySelector('span').textContent = flowName || "Loaded Flow";
        
        // Reset status only if not currently executing
        if (!isExecuting) {
            setStatus('ready', 'Ready');
        }
    }

    function loadModule(moduleKey) {
         const module = MODULES[moduleKey]; 
         if (!module) return;
         loadFlow(module, module.name);
    }

    // --- UPDATE: Chat Interface Node Init (Handles Auto-Run and File Upload) ---
    function initChatInterfaceNode(node) {
        const sendBtn = node.el.querySelector('.node-chat-send-btn');
        const inputEl = node.el.querySelector('.node-chat-input');
        const attachBtn = node.el.querySelector('.node-chat-attach-btn');
        const fileInput = node.el.querySelector('.node-chat-file-input');
        const fileStatus = node.el.querySelector('.node-chat-file-status');

        // State for attached file within the node's internal state
        node.internalState.attachedFile = null;

        attachBtn.addEventListener('click', () => fileInput.click());

        fileInput.addEventListener('change', (event) => {
            const file = event.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (e) => {
                const base64String = e.target.result.split(',')[1];
                node.internalState.attachedFile = { data: base64String, mimeType: file.type, fileName: file.name };
                fileStatus.textContent = `Attached: ${file.name}`;
                // Optional: Show a thumbnail if it's an image (requires updating addMessageToChatUI)
            };
            reader.readAsDataURL(file);
        });

        const handleSend = () => {
            const messageText = inputEl.value.trim();
            const attachedFile = node.internalState.attachedFile;

            if (!messageText && !attachedFile) return;

            // 1. Display user message in the UI
            // If only file, display filename, otherwise display text.
            const displayMessage = messageText || `[File: ${attachedFile.fileName}]`;
            addMessageToChatUI(node, displayMessage, 'user');
            
            // 2. Set the output buffer (Structured object)
            node.outputBuffer = {
                text: messageText,
                media: attachedFile 
            };

            // 3. Clear inputs
            inputEl.value = '';
            node.internalState.attachedFile = null;
            fileInput.value = ''; // Clear the file input
            fileStatus.textContent = 'No file attached.';

            // 4. Auto-trigger the flow execution
            // If an autonomous loop is paused waiting for this input, sending the message should resume/start the execution.
            if (!isExecuting || node.el.classList.contains('paused')) {
                node.el.classList.remove('paused');
                startExecution();
            } else {
                // If execution is already happening (e.g. autonomous loop is running a different part of the flow), 
                // the new user input (stored in outputBuffer) will be picked up when the chat-interface node executes next.
                console.log("Chat input received while flow is running. Will be processed in the next cycle/execution.");
            }
        };

        sendBtn.addEventListener('click', handleSend);
        inputEl.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault(); // Prevent newline in input if it were a textarea
                handleSend();
            }
        });
    }

    // --- Math Node Init ---
    function calculateMath(a, b, op) {
        a = isNaN(a) ? 0 : a;
        b = isNaN(b) ? 0 : b;
        switch (op) {
            case 'add': return a + b;
            case 'subtract': return a - b;
            case 'multiply': return a * b;
            case 'divide': return b !== 0 ? a / b : 'Infinity';
            case 'modulo': return b !== 0 ? a % b : 'NaN';
            case 'power': return Math.pow(a, b);
            default: return 'N/A';
        }
    }

    function initMathNode(node) {
        const valA_input = node.el.querySelector('.math-value-a');
        const valB_input = node.el.querySelector('.math-value-b');
        const op_select = node.el.querySelector('.math-op-select');
        const result_pre = node.el.querySelector('.node-output-preview');

        // Ensure UI reflects current data (important for AI updates)
        if (node.data.a !== undefined) valA_input.value = node.data.a;
        if (node.data.b !== undefined) valB_input.value = node.data.b;
        if (node.data.op) op_select.value = node.data.op;

        const update = () => {
            node.data.a = parseFloat(valA_input.value);
            node.data.b = parseFloat(valB_input.value);
            node.data.op = op_select.value;
            const result = calculateMath(node.data.a, node.data.b, node.data.op);
            result_pre.textContent = result;
        };
        
        valA_input.addEventListener('input', update);
        valB_input.addEventListener('input', update);
        op_select.addEventListener('change', update);
        update();
    }

    // --- Drawing Node Init ---
    function initDrawingNode(node) {
        const canvas = node.el.querySelector('.node-drawing-canvas');
        const eraseBtn = node.el.querySelector('.erase-btn');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, lastX = 0, lastY = 0;
        ctx.strokeStyle = '#EAEAEA'; ctx.lineWidth = 3; ctx.lineJoin = 'round'; ctx.lineCap = 'round';
        
        const getCoords = (e) => {
            const rect = canvas.getBoundingClientRect();
            const clientX = e.touches ? e.touches[0].clientX : e.clientX;
            const clientY = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: clientX - rect.left, y: clientY - rect.top };
        };

        const draw = (e) => {
            if (!isDrawing) return;
            e.preventDefault();
            const { x, y } = getCoords(e);
            ctx.beginPath(); ctx.moveTo(lastX, lastY); ctx.lineTo(x, y); ctx.stroke();
            [lastX, lastY] = [x, y];
        };

        const startDrawing = (e) => { isDrawing = true; const { x, y } = getCoords(e);[lastX, lastY] = [x, y]; };
        const stopDrawing = () => isDrawing = false;

        canvas.addEventListener('mousedown', startDrawing);
        canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing);
        canvas.addEventListener('mouseout', stopDrawing);
        canvas.addEventListener('touchstart', startDrawing, { passive: false });
        canvas.addEventListener('touchmove', draw, { passive: false });
        canvas.addEventListener('touchend', stopDrawing);
        eraseBtn.addEventListener('click', () => ctx.clearRect(0, 0, canvas.width, canvas.height));
    }

    // --- Audio Node Init ---
    function initAudioNode(node) {
        const audioEl = node.el.querySelector('.node-audio-preview');
        const recordBtn = node.el.querySelector('.record-btn');
        const stopBtn = node.el.querySelector('.stop-btn');
        const playBtn = node.el.querySelector('.play-btn');
        const deleteBtn = node.el.querySelector('.delete-btn');
        const statusP = node.el.querySelector('.audio-status');
        let mediaRecorder, audioChunks = [];

        recordBtn.addEventListener('click', async () => {
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                mediaRecorder = new MediaRecorder(stream);
                node.internalState.stream = stream;
                mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                mediaRecorder.onstop = () => {
                    const audioBlob = new Blob(audioChunks, { type: 'audio/webm' });
                    const audioUrl = URL.createObjectURL(audioBlob);
                    audioEl.src = audioUrl;
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        node.internalState.audioData = { data: e.target.result.split(',')[1], mimeType: 'audio/webm', fileName: `recording-${Date.now()}.webm` };
                    };
                    reader.readAsDataURL(audioBlob);
                    if (node.internalState.stream) node.internalState.stream.getTracks().forEach(track => track.stop());
                };
                audioChunks = []; mediaRecorder.start();
                statusP.textContent = 'Recording...';
                recordBtn.disabled = true; stopBtn.disabled = false; playBtn.disabled = true; deleteBtn.disabled = true;
            } catch(err) { console.error("Mic error:", err); showToast("Could not access microphone.", "error"); }
        });

        stopBtn.addEventListener('click', () => {
            if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
            statusP.textContent = 'Stopped.';
            recordBtn.disabled = false; stopBtn.disabled = true; playBtn.disabled = false; deleteBtn.disabled = false;
        });
        playBtn.addEventListener('click', () => { audioEl.play(); statusP.textContent = 'Playing...'; audioEl.onended = () => statusP.textContent = 'Stopped.'; });
        deleteBtn.addEventListener('click', () => {
            audioChunks = []; node.internalState.audioData = null; audioEl.src = ''; statusP.textContent = 'Idle.';
            recordBtn.disabled = false; stopBtn.disabled = true; playBtn.disabled = true; deleteBtn.disabled = true;
        });
    }

    // --- String Formatter Logic ---
    // Handles dynamic inputs based on the template string (e.g., {variable}).
    function initStringFormatter(node) {
        const templateInput = node.el.querySelector('.template-input');

        // Ensure UI reflects current data (important for AI updates)
        if (node.data.template && templateInput.value !== node.data.template) {
            templateInput.value = node.data.template;
        }
        
        templateInput.addEventListener('input', () => {
            node.data.template = templateInput.value;
            updateFormatterInputsFromTemplate(node);
            runStringFormatter(node);
        });
        updateFormatterInputsFromTemplate(node);
        runStringFormatter(node);
    }

    function updateFormatterInputsFromTemplate(node) {
        const template = node.data.template || '';
        const regex = /\{([^{}]+)\}/g; let match;
        const requiredKeys = new Set();
        while ((match = regex.exec(template)) !== null) requiredKeys.add(match[1].trim());

        const currentInputs = node.inputs.map(i => i.name);
        const newKeys = Array.from(requiredKeys);

        if (JSON.stringify(currentInputs.sort()) !== JSON.stringify(newKeys.sort())) {
            const connectionsToKeep = []; const connectionsToRemove = [];
            connections.forEach(c => {
                if (c.toNode === node.id) {
                    const keyName = node.inputs[c.toPortIndex]?.name;
                    if (requiredKeys.has(keyName)) connectionsToKeep.push({ ...c, keyName: keyName });
                    else connectionsToRemove.push(c.id);
                }
            });

            connections = connections.filter(c => !connectionsToRemove.includes(c.id));
            connectionsToRemove.forEach(id => document.getElementById(id)?.remove());
            node.inputs = newKeys.map(key => ({ name: key, dataType: 'any', label: key }));
            rebuildNodeIO(node);

            connectionsToKeep.forEach(c => {
                const newIndex = node.inputs.findIndex(input => input.name === c.keyName);
                if (newIndex !== -1) {
                    const conn = connections.find(conn => conn.id === c.id);
                    if (conn) {
                        conn.toPortId = `${node.id}_in_${newIndex}`;
                        conn.toPortIndex = newIndex;
                    }
                }
            });
            updateAllConnections();
        }
    }

    function runStringFormatter(node, inputData = {}) {
        let result = node.data.template || node.el.querySelector('.template-input').value;
        node.inputs.forEach((input, i) => {
            const value = inputData[i] !== undefined ? inputData[i] : (node.inputBuffer ? (node.inputBuffer[i] ?? '') : '');
            result = result.replace(new RegExp(`\\{${input.name}\\}`, 'g'), String(value));
        });
        node.el.querySelector('.node-output-preview').textContent = result;
        return result;
    }
