<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Flow Visualizer</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;600&family=Roboto+Mono&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&icon_names=add,attach_file,auto_awesome,calculate,call_split,chat,close,code_blocks,content_copy,data_object,delete,download,draw,expand_less,expand_more,folder_open,format_quote,forum,grid_on,http,hub,image,input,javascript,label,memory,mic,photo_camera,play_arrow,polyline,remove,rule,save,search,send,sentiment_satisfied,settings,short_text,stop,stop_circle,upload,upload_file,view_module,visibility&display=swap" />
    <link rel="stylesheet" href="css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js" defer></script>
</head>
<body>

    <!-- Header / Toolbar -->
    <div class="header">
        <h1>AI Flow Visualizer</h1>
        <div class="toolbar-divider"></div>

        <!-- Modules Dropdown -->
        <div class="dropdown">
            <button class="dropdown-button" id="modules-dropdown-btn">
                <span class="material-symbols-outlined">view_module</span>
                <span id="modules-btn-label">Modules</span>
            </button>
            <div class="dropdown-content" id="modules-dropdown-content"></div>
        </div>

        <div class="toolbar-divider"></div>

        <!-- Save / Load / Export / Import -->
        <button class="toolbar-button" id="save-flow-btn" title="Save to Browser">
            <span class="material-symbols-outlined">save</span>Save
        </button>
        <button class="toolbar-button" id="load-flow-btn" title="Load from Browser">
            <span class="material-symbols-outlined">folder_open</span>Load
        </button>
        <button class="toolbar-button" id="export-flow-btn" title="Export as JSON">
            <span class="material-symbols-outlined">download</span>Export
        </button>
        <button class="toolbar-button" id="import-flow-btn" title="Import JSON">
            <span class="material-symbols-outlined">upload</span>Import
        </button>

        <div class="toolbar-divider"></div>

        <!-- Settings -->
        <button class="toolbar-button" id="settings-btn" title="LLM Settings">
            <span class="material-symbols-outlined">settings</span>Settings
        </button>

        <div class="toolbar-divider"></div>

        <!-- Autonomous Loop Controls -->
        <label style="display: flex; align-items: center; gap: 8px; font-size: 0.9em; cursor: pointer;">
            <input type="checkbox" id="autonomous-toggle" style="cursor: pointer;">
            Autonomous
        </label>
        <label style="display: flex; align-items: center; gap: 6px; font-size: 0.9em;">
            Cycles:
            <input type="number" id="max-cycles-input" value="5" min="1" max="100" style="width: 55px; padding: 4px 6px; font-size: 0.9em;">
        </label>

        <!-- Run Button -->
        <button class="run-button" id="runButton">
            <span class="material-symbols-outlined">play_arrow</span>Run Flow
        </button>

        <!-- Status Indicator -->
        <div id="status-indicator">
            <div id="status-dot"></div>
            <span id="status-text">Ready</span>
        </div>
    </div>

    <!-- Main Content Area -->
    <div class="main-content">
        <!-- Side Panel: Node Library -->
        <div id="side-panel">
            <div id="node-library-list"></div>
        </div>

        <!-- Canvas Area -->
        <div id="node-canvas">
            <div id="canvas-wrapper">
                <svg id="connections-layer"></svg>
            </div>

            <!-- Zoom / Grid Controls -->
            <div class="zoom-controls">
                <button class="control-btn" id="zoom-in" title="Zoom In"><span class="material-symbols-outlined">add</span></button>
                <button class="control-btn" id="zoom-out" title="Zoom Out"><span class="material-symbols-outlined">remove</span></button>
                <button class="control-btn" id="snap-grid-btn" title="Toggle Snap to Grid"><span class="material-symbols-outlined">grid_on</span></button>
            </div>

            <!-- AI Chat FAB -->
            <button class="control-btn" id="ai-chat-fab" title="AI Flow Assistant"><span class="material-symbols-outlined">auto_awesome</span></button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- AI Assistant Chat Dialog -->
    <div class="chat-dialog" id="ai-chat-dialog">
        <div class="chat-header">
            <h3>AI Flow Assistant</h3>
            <button id="close-chat-btn">&times;</button>
        </div>
        <div class="chat-messages" id="chat-messages"></div>
        <form class="chat-input-area" id="chat-form">
            <input type="text" id="chat-input" placeholder="Ask me to build a flow...">
            <button type="submit" class="node-internal-button">Send</button>
        </form>
    </div>

    <!-- Application Module -->
    <script type="module" src="js/main.js"></script>
</body>
</html>
